<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendar, atlcal</title>
  <meta name="description" content="A month grid of Atlanta arts events. Filter by category, organization, or free admission. Times in Eastern time.">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body>
  <a class="sr-only" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="../">atlcal<small>arts across the metro</small></a>
      <nav class="site-nav" aria-label="Pages">
        <a href="../calendar/" aria-current="page">Calendar</a>
        <a href="../agenda/">Agenda</a>
        <a href="../feeds/">Subscribe</a>
      </nav>
    </div>
  </header>

  <main id="main" class="shell">
    <div class="page-head">
      <h1>Calendar</h1>
      <p>A month of every showing. Tap a day to expand it, tap a chip for details. Times are in Eastern time. The calendar marks weekends and today.</p>
    </div>

    <section id="filters" class="filters" aria-label="Filters" hidden></section>

    <div class="cal-toolbar">
      <div class="cal-toolbar__title" id="cal-title" aria-live="polite"></div>
      <div class="cal-toolbar__spacer"></div>
      <div class="cal-nav">
        <button class="btn btn--sm" type="button" id="cal-prev" aria-label="Previous month">&larr;</button>
        <button class="btn btn--sm" type="button" id="cal-today">Today</button>
        <button class="btn btn--sm" type="button" id="cal-next" aria-label="Next month">&rarr;</button>
      </div>
    </div>

    <p id="cal-status" class="sr-only" role="status" aria-live="polite"></p>
    <div id="cal-out" aria-busy="true"></div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span id="footer-updated"></span>
      <span>atlcal. A read-only presentation layer over a nightly-emitted events file.</span>
    </div>
  </footer>

  <div id="detail-modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="detail-title"></div>

  <script src="../assets/data.js"></script>
  <script src="../assets/calendar.js"></script>
</body>
</html>
